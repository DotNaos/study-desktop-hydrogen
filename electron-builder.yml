appId: com.aryazos.study-desktop
productName: Study Desktop
directories:
    buildResources: build
files:
    - out/**
    - resources/**
    - .chromium/**
    - package.json
    - '!**/*.map'
asar: true
asarUnpack:
    - '**/*.node'
extraMetadata:
    main: out/main/index.js
nodeGypRebuild: false
buildDependenciesFromSource: false
npmRebuild: false
mac:
    icon: build/icon.icns
    entitlementsInherit: build/entitlements.mac.plist
    hardenedRuntime: true
    notarize: true
    target:
        - target: dmg
          arch:
              - arm64
        - target: zip
          arch:
              - arm64
win:
    target:
        - target: nsis
          arch:
              - x64
linux:
    target:
        - target: AppImage
          arch:
              - x64
publish:
    provider: github
    owner: DotNaos
    repo: study-desktop-hydrogen
    releaseType: release
    vPrefixedTagName: true
